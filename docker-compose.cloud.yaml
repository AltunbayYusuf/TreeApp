services:
  web:
    build:
      context: .
      dockerfile: UI-MVC/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=cloudsql-proxy;Port=5432;Database=TreeApp;Username=postgres;Password=${DB_PASSWORD}
      Gemini__ApiKey: ${GEMINI_API_KEY}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      cloudsql-proxy:
        condition: service_healthy
    restart: on-failure

  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "--credentials-file=/secrets/sa-key.json"
      - "--health-check"
      - "--http-address=0.0.0.0"
      - "--http-port=9090"
      - "integratieproject-mvp:europe-west1:treeapp-db-new"
    volumes:
      - /tmp/sa-key.json:/secrets/sa-key.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:9090/readiness"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: always

volumes:
  dataprotection-keys: