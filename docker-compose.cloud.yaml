services:
  web:
    build:
      context: .
      dockerfile: UI-MVC/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=cloudsql-proxy;Port=5432;Database=TreeApp;Username=postgres;Password={${DB_PASSWORD}};Gss Encryption Mode=Disable;SSL Mode=Disable"
      RootDomain: ${ROOT_DOMAIN:-echo20.com}
      AppSubdomain: ${APP_SUBDOMAIN:-treeapp}
      GoogleCloudStorage__BucketName: ${GCS_BUCKET:-treecompanyimages}
      GoogleCloudStorage__PublicBaseUrl: ${GCS_PUBLIC_URL:-https://storage.googleapis.com/treecompanyimages}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      cloudsql-proxy:
        condition: service_healthy
    restart: on-failure
  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "--credentials-file=/secrets/sa-key.json"
      - "--health-check"
      - "--http-address=0.0.0.0"
      - "--http-port=9090"
      - "${PROJECT_ID:-integratieproject-mvp}:europe-west1:treeapp-db"
    volumes:
      - /tmp/sa-key.json:/secrets/sa-key.json:ro
    healthcheck:
      test: ["CMD", "/cloud-sql-proxy", "wait", "--max=10s"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: always
volumes:
  dataprotection-keys: